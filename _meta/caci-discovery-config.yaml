sam_searches:
  # SAM.gov query slices anchored on `organizationName` text search.
  #
  # Architecture rewrite 2026-06-01 after empirical verification that
  # SAM.gov v2 search ignores `ncode`, `naicsCode`, `ccode`, `q`, and
  # `placeOfPerformanceCountry` parameters. The only parameter we've
  # confirmed filters meaningfully is `organizationName`. The previous
  # 8-slice plan (NAICS/PSC/keyword-based) is preserved in git history at
  # commit 8922ce2 if needed for reference.
  #
  # Empirical baseline: `organizationName=NAVSUP FLC YOKOSUKA` returned
  # 29 records over 56 days on 2026-05-31 — well under the 1000-record
  # page cap, so full window coverage in one quota call. Each slice
  # below targets a Pacific Navy or Air Force contracting office expected
  # to be similarly small (10s to low hundreds of records per 56 days).
  #
  # Day-1 deployment: run all eight in one batch (8 quota calls). Per-slice
  # date-span output will reveal which organizationName strings SAM.gov
  # recognizes vs. silently no-matches. Drop any that return zero.
  #
  # The exact text strings here are educated candidates based on standard
  # DoD-contracting-office nomenclature; only NAVSUP FLC YOKOSUKA is
  # empirically confirmed.

  - name: nav_yokosuka
    description: "NAVSUP FLC YOKOSUKA — operator-team's primary customer contracting office. EMPIRICALLY CONFIRMED 2026-05-31: 29 records over 56 days."
    params:
      organizationName: NAVSUP FLC YOKOSUKA
      ptype: r,s,p,k

  - name: nav_pearl_harbor
    description: "NAVSUP FLC PEARL HARBOR — Pacific Fleet primary supply chain contracting office at Pearl Harbor, Hawaii. Operator-team extendable customer per operator_team_layer."
    params:
      organizationName: NAVSUP FLC PEARL HARBOR
      ptype: r,s,p,k

  - name: nav_san_diego
    description: "NAVSUP FLC SAN DIEGO — West Coast Pacific Fleet supply chain contracting office. Operator-team extendable per Pacific footprint."
    params:
      organizationName: NAVSUP FLC SAN DIEGO
      ptype: r,s,p,k

  - name: nav_puget_sound
    description: "NAVSUP FLC PUGET SOUND — Pacific Northwest supply chain contracting office. Operator team has direct work history here per operator confirmation 2026-05-31."
    params:
      organizationName: NAVSUP FLC PUGET SOUND
      ptype: r,s,p,k

  - name: nav_srf_jrmc
    description: "SRF-JRMC direct customer-name search — Ship Repair Facility / Japan Regional Maintenance Center, Yokosuka. Operator's primary customer."
    params:
      organizationName: SRF-JRMC
      ptype: r,s,p,k

  - name: nav_nswc_corona
    description: "NSWC CORONA — Naval Surface Warfare Center Corona Division, operator-team secondary customer (SMDII partnership)."
    params:
      organizationName: NSWC CORONA
      ptype: r,s,p,k

  - name: af_yokota
    description: "Air Force at Yokota AB Japan — 374 CONS (Contracting Squadron), 374th Airlift Wing. Main Air Force contracting shop in mainland Japan. Operator-team's Air Force IDIQ (FA807518D0006) makes Pacific Air Force opportunities a reachable expansion lane."
    params:
      organizationName: 374 CONS
      ptype: r,s,p,k

  - name: af_kadena
    description: "Air Force at Kadena AB Okinawa — 18 CONS, 18th Wing. Largest combat wing in PACAF; high task-order volume expected."
    params:
      organizationName: 18 CONS
      ptype: r,s,p,k

out_of_scope:
# Categories CACI cannot structurally deliver — these get a max-0.3 score
# cap regardless of which layer matched.

# Schoolhouse curriculum and individual-sailor training
- Schoolhouse curriculum (NETC, Sailor 2025, Ready Relevant Learning)
- Damage-control hand-skills training for individual Sailors

# Generic Navy work-types CACI does not specifically pursue
- General Navy shipbuilding without a training / exercise / maintenance angle
- General Navy IT helpdesk vehicles
- NAWCTSD simulator sustainment, NAWCTSD-managed aviator training, naval flight simulator IDIQ task orders

# Physical labor / trades / manufacturing — work-types CACI does not deliver
# (CACI does not have factories, shipyards, or trades crews; these contracts
# go to HII, Vigor, GD-NASSCO, BAE-Norfolk, and similar trades primes)
- Housing maintenance and grounds maintenance
- Corrosion control (paint, blasting, coatings) and other physical preservation
- General trades work (electrical, plumbing, HVAC, carpentry, welding, metalworking)
- Manufacturing and factory production work
- Shipyard physical labor and craftsperson work
- Shipyard physical infrastructure (drydock, crane, MILCON) without a training / engineering / IT angle

# Generic facility-services contracts that mismatch CACI's operating model
- Janitorial and facility services
- Food service and retail support

# Refined non-DoD federal civil work carve-outs (replaces the prior blanket
# "Non-DoD federal civil work" exclusion 2026-05-30; CACI does plausibly
# deliver general civil-IT work, but not the specialty domains below).
- Clinical healthcare data work, PACS medical imaging informatics, radiology cardiology and pathology workflow systems, hospital PACS migration, clinical-trial systems, biological containment isolation systems, immunohistochemistry equipment, NAICS 334516 analytical lab instruments, NAICS 339113 surgical and medical instruments
