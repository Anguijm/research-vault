source: opportunities/PMTEC-USINDOPACOM/04_artifacts/capture-brief-v0.3-draft.docx
output: opportunities/PMTEC-USINDOPACOM/04_artifacts/capture-brief-v0.3.1-draft.docx

text_replacements:
  # §10.1 — strip "earlier draft cited $100M" framing
  - find: "Play 1 — Non-kinetic effects simulation (Spectral-Lite / Trojan-Lite): $10M–$40M TAM PMTEC-DIRECT (single OTA + 2-3 yr expansion). The earlier draft cited $100M including Army DEVCOM EW training and Navy NIWC training — those buy through separate procurement chains, NOT PMTEC, so they are properly classified as ADJACENT market opportunities (estimated additional $30M-$60M over 5 years if Play 1 PMTEC win establishes a reusable platform). The two numbers should not be conflated when sizing the PMTEC capture decision."
    replace: "Play 1 — Non-kinetic effects simulation (Spectral-Lite / Trojan-Lite): $10M–$40M TAM (PMTEC-direct). Floor scenario: single DIU OTA at PMTEC scale (~$10M, multi-year). Ceiling: PMTEC-scoped 2-3 year expansion across exercises (Cobra Gold, Valiant Shield, Balikatan). Adjacent (non-PMTEC) market opportunity: $30M–$60M over 5 years if the PMTEC win establishes a reusable training-grade EW/SIGINT injection platform — addressable through separate procurement chains (Army DEVCOM EW training, Navy NIWC training, USAF 53rd EWG), which are distinct from PMTEC's vehicle. The PMTEC-direct TAM is the relevant number for the PMTEC capture decision; the adjacent number is upside contingent on a follow-on platform-reuse decision."

  # §7.1 Play 1 — drop meta-narration about "frames them as feasibility questions"
  - find: "Plan acknowledges the hard constraints (and frames them as feasibility questions to be answered, not assumed): (1) classification —"
    replace: "Plan acknowledges three hard constraints, each of which is a government feasibility question rather than a CACI deliverable: (1) classification —"

  # §6.1 ARKA — strip SIGINT scope creep (Decision F)
  - find: "ARKA brings satellite EO/IR and hyperspectral imaging plus autonomous threat-classification software for SIGINT/GEOINT — relevant to SDA PWSA pull-through."
    replace: "ARKA brings satellite EO/IR and hyperspectral imaging plus autonomous threat-classification software (CACI press release describes the software as 'Agentic AI-based') for geospatial intelligence — relevant to SDA PWSA pull-through. (Scope note: ARKA does not market SIGINT; CACI's legacy SIGINT capabilities — Spectral, Trojan — are a separate stack.)"

  # §7.2 Lockheed JFN — separate ARKA-feed from legacy-SIGINT
  - find: "CACI's realistic JFN play is NOT to displace L3Harris on the EW thread but to offer complementary SIGINT-to-targeting plug-ins on parts of the JFN architecture L3Harris isn't directly covering (e.g., post-ARKA space-based detection feeding JFN's targeting fusion)."
    replace: "CACI's realistic JFN play is NOT to displace L3Harris on the EW thread but to offer two distinct complementary feeds: (a) CACI legacy SIGINT (Spectral, Trojan) feeding JFN's targeting fusion on parts of the architecture L3Harris isn't directly covering, and (b) ARKA EO/IR + hyperspectral space-based detection feeding JFN's targeting fusion as a separate sensor track. These are two distinct stacks; do not conflate them with each other or with ARKA's product scope."

