# Two buckets:
#   - Bucket A: 10 buyer-triad queries (test hypothesis that AI search
#     returns 0 results for these specific queries).
#   - Bucket B: 3 baseline queries with known recent successes in 01_sources/.
#
# SAM and USAspending are intentionally minimal (1 query each) so the diagnostic
# focuses on the AI path. USAspending also tests whether the 2026-05-25
# internal_id field fix in _scripts/lib/usaspending.py:102 resolves the
# 500-outage pattern.

ai_searches:
  # ---- Bucket B: 3 baseline queries (control group) ----
