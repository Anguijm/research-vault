# BDR-FLEET-READINESS — DIAGNOSTIC config for 2026-05-25 0-candidate investigation.
#
# Built per the converged v3 diagnostic plan
# (_red-teams/2026-05-25-gemini-pro-diagnostic-plan-dialogue.md). Purpose:
# isolate which stage of _run_ai_search produced 0 candidates queued in the
# 2026-05-25 morning find_sources pass.
