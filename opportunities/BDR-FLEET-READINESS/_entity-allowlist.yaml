# Operator-confirmed entities for the BDR-FLEET-READINESS research track.
#
# Entities listed here are excluded from the audit_named_entities and
# audit_search_config "contaminated" bucket because the operator has
# affirmed they are legitimately part of this research's analytical
# context — even when no ingested source has surfaced them yet.
#
# Allowlisting an entity name DOES NOT mean every claim about that entity
# is FACT. The verify_facts.py workflow still has to check specific claims
# against specific sources. The allowlist only resolves the entity-presence
# audit, not the FACT-claim audit.
#
# Format: entity name as the YAML key, operator's reason as the value.
# Use exact case-sensitive name matching the entry in the watchlist at
# _meta/named-entities-watchlist.yaml.

allowlist:
  # CACI and its tracked products — the operator's company; baseline reference
  # for any opportunity in this vault.
  CACI: The operator's company. Baseline reference for any opportunity in this vault. Does not require an ingested source to appear in analytical content.
  ARKA: CACI subsidiary acquired March 2026. Operator-blessed cross-opportunity reference.
  Spectral: CACI legacy SIGINT capability. Operator-blessed cross-opportunity reference.
  Trojan: CACI legacy SIGINT capability. Operator-blessed cross-opportunity reference.
  SkyTracker: CACI counter-UAS product. Operator-blessed cross-opportunity reference.
  CORIAN: CACI counter-UAS product. Operator-blessed cross-opportunity reference.
  X-MADIS: CACI counter-UAS product. Operator-blessed cross-opportunity reference.

  # Canonical naval-services incumbents — operator-blessed 2026-05-23 as
  # entities the BDR hypothesis must contend with regardless of whether a
  # specific source has surfaced them. Used in §7 leg 5 as the named
  # incumbent technical partners whose Carderock relationships could lock
  # CACI out of the play.
  SAIC: Canonical naval-services incumbent. Operator-blessed for §7 hypothesis leg 5 — Carderock-adjacent technical partner whose existing relationships shape CACI's entry timeline. Specific claims about SAIC capability still need source backing.
  Leidos: Canonical naval-services incumbent. Operator-blessed for §7 hypothesis leg 5 — Carderock-adjacent technical partner whose existing relationships shape CACI's entry timeline. Specific claims about Leidos capability still need source backing.
  HII Mission Technologies: Canonical naval competitor. Operator-blessed for §7 hypothesis leg 5 — inherited the Alion ship-damage modeling work and is the most directly competitive incumbent for Carderock-adjacent capability. Specific claims still need source backing.


