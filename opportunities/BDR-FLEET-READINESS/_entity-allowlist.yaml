# Entities listed here are excluded from the audit_named_entities and
# audit_search_config "contaminated" bucket because the operator has
# affirmed they are legitimately part of this research's analytical
# context — even when no ingested source has surfaced them yet.
#
# Allowlisting an entity name DOES NOT mean every claim about that entity
# is FACT. The verify_facts.py workflow still has to check specific claims
# against specific sources. The allowlist only resolves the entity-presence
# audit, not the FACT-claim audit.
#
# Format: entity name as the YAML key, operator's reason as the value.
# Use exact case-sensitive name matching the entry in the watchlist at
# _meta/named-entities-watchlist.yaml.

